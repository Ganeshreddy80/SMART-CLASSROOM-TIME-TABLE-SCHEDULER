<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>System Access</title>
<meta name="robots" content="noindex,nofollow">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{
  --dark:#0a0a0f;--surface:#111118;--border:#1e1e2e;
  --text:#e4e4e7;--muted:#71717a;
  --gold:#f5c518;--gold-dark:#c9a200;
  --danger:#ef4444;
}
body{
  font-family:'Inter',system-ui,-apple-system,'Segoe UI',sans-serif;
  background:var(--dark);
  min-height:100vh;display:flex;align-items:center;justify-content:center;
  position:relative;overflow:hidden;color:var(--text);
}

/* Subtle grid pattern */
body::before{
  content:'';position:fixed;inset:0;
  background-image:
    linear-gradient(rgba(255,255,255,.01) 1px,transparent 1px),
    linear-gradient(90deg,rgba(255,255,255,.01) 1px,transparent 1px);
  background-size:40px 40px;
  pointer-events:none;
}

@keyframes fadeUp{
  from{opacity:0;transform:translateY(20px)}
  to{opacity:1;transform:translateY(0)}
}
@keyframes shake{
  0%,100%{transform:translateX(0)}
  20%,60%{transform:translateX(-5px)}
  40%,80%{transform:translateX(5px)}
}

.login-card{
  background:var(--surface);border-radius:16px;padding:40px 36px;
  width:400px;max-width:92vw;
  border:1px solid var(--border);
  box-shadow:0 20px 60px rgba(0,0,0,.5);
  animation:fadeUp .5s ease-out;
  position:relative;z-index:10;
}

.login-card h2{
  font-size:1.1rem;font-weight:700;color:var(--text);
  margin-bottom:4px;text-align:center;letter-spacing:-.01em;
}
.login-subtitle{
  color:var(--muted);font-size:.75rem;margin-bottom:28px;
  font-weight:500;text-align:center;
}

.login-error{
  background:rgba(239,68,68,.08);border:1px solid rgba(239,68,68,.2);
  border-radius:10px;padding:10px 14px;margin-bottom:16px;
  font-size:.8rem;color:#ef4444;font-weight:500;
  display:flex;align-items:center;gap:8px;
  animation:shake .4s;
}

.login-form{text-align:left}
.form-group{margin-bottom:16px}
.form-group label{
  display:block;font-size:.68rem;font-weight:700;
  text-transform:uppercase;letter-spacing:.08em;
  color:var(--muted);margin-bottom:6px;
}
.form-group input{
  width:100%;padding:12px 16px;
  border:1.5px solid var(--border);border-radius:10px;
  font-size:.88rem;font-family:inherit;
  background:var(--dark);color:var(--text);
  transition:all .25s;
}
.form-group input::placeholder{color:#3f3f46}
.form-group input:focus{
  outline:none;border-color:var(--gold-dark);
  box-shadow:0 0 0 3px rgba(245,197,24,.08);
}

.sign-in-btn{
  width:100%;padding:13px;margin-top:6px;
  background:var(--gold);
  border:none;border-radius:10px;
  font-size:.9rem;font-weight:700;color:var(--dark);
  cursor:pointer;font-family:inherit;transition:all .2s;
}
.sign-in-btn:hover{
  background:var(--gold-dark);
  transform:translateY(-1px);
  box-shadow:0 4px 15px rgba(245,197,24,.2);
}
.sign-in-btn:active{transform:translateY(0)}

@media(max-width:480px){
  .login-card{padding:28px 20px;border-radius:12px}
}
</style>
</head>
<body>

<div class="login-card">
  <h2>System Access</h2>
  <p class="login-subtitle">Authorized personnel only</p>

  {% if error %}
  <div class="login-error">
    <span>⚠️</span> {{ error }}
  </div>
  {% endif %}

  <form method="POST" action="/x7k9-admin" class="login-form" id="adminLoginForm">
    <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
    <div class="form-group">
      <label>EMAIL</label>
      <input type="email" name="email" required
        placeholder="Email address" autocomplete="email">
    </div>
    <div class="form-group">
      <label>PASSWORD</label>
      <input type="password" name="password" required
        placeholder="Password" autocomplete="current-password">
    </div>
    <button type="submit" class="sign-in-btn">
      Authenticate
    </button>
  </form>
</div>

</body>
</html>
